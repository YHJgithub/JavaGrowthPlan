<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e14" id="metaThemeColor" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Java 成长路线图 · 9-10 个月进阶计划</title>
  <script>
    (function () {
      var k = 'java_growth_roadmap_theme';
      var t = localStorage.getItem(k) || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    :root,
    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0a0e14;
      --bg-card: #12181f;
      --bg-card-hover: #161d27;
      --bg-elevated: #1a222d;
      --bg-overlay: rgba(0,0,0,0.2);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.14);
      --text: #e8edf4;
      --text-secondary: #8b9cb3;
      --text-muted: #5c6b80;
      --accent: #378ADD;
      --success: #3ecf8e;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --gradient-a: rgba(55,138,221,0.12);
      --gradient-b: rgba(127,119,221,0.06);
      --optional-tag-bg: rgba(255,255,255,0.06);
      --theme-meta: #0a0e14;
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f4f6f9;
      --bg-card: #ffffff;
      --bg-card-hover: #eef1f6;
      --bg-elevated: #e3e8ef;
      --bg-overlay: rgba(0,0,0,0.03);
      --border: rgba(0,0,0,0.08);
      --border-hover: rgba(0,0,0,0.14);
      --text: #152030;
      --text-secondary: #5a6b80;
      --text-muted: #8494a7;
      --accent: #2563b8;
      --success: #1a9d5c;
      --shadow: 0 4px 20px rgba(15,23,42,0.08);
      --gradient-a: rgba(55,138,221,0.08);
      --gradient-b: rgba(127,119,221,0.05);
      --optional-tag-bg: rgba(0,0,0,0.04);
      --theme-meta: #f4f6f9;
    }

    [data-theme="system"] {
      color-scheme: dark;
      --bg: #0a0e14;
      --bg-card: #12181f;
      --bg-card-hover: #161d27;
      --bg-elevated: #1a222d;
      --bg-overlay: rgba(0,0,0,0.2);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.14);
      --text: #e8edf4;
      --text-secondary: #8b9cb3;
      --text-muted: #5c6b80;
      --accent: #378ADD;
      --success: #3ecf8e;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --gradient-a: rgba(55,138,221,0.12);
      --gradient-b: rgba(127,119,221,0.06);
      --optional-tag-bg: rgba(255,255,255,0.06);
      --theme-meta: #0a0e14;
    }

    @media (prefers-color-scheme: light) {
      [data-theme="system"] {
        color-scheme: light;
        --bg: #f4f6f9;
        --bg-card: #ffffff;
        --bg-card-hover: #eef1f6;
        --bg-elevated: #e3e8ef;
        --bg-overlay: rgba(0,0,0,0.03);
        --border: rgba(0,0,0,0.08);
        --border-hover: rgba(0,0,0,0.14);
        --text: #152030;
        --text-secondary: #5a6b80;
        --text-muted: #8494a7;
        --accent: #2563b8;
        --success: #1a9d5c;
        --shadow: 0 4px 20px rgba(15,23,42,0.08);
        --gradient-a: rgba(55,138,221,0.08);
        --gradient-b: rgba(127,119,221,0.05);
        --optional-tag-bg: rgba(0,0,0,0.04);
        --theme-meta: #f4f6f9;
      }
    }

    :root {
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.2s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, var(--gradient-a), transparent),
        radial-gradient(ellipse 60% 40% at 100% 50%, var(--gradient-b), transparent);
      pointer-events: none;
      z-index: 0;
      transition: background 0.25s ease;
    }

    body {
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 20px calc(60px + env(safe-area-inset-bottom, 0px));
      padding-top: calc(28px + env(safe-area-inset-top, 0px));
    }

    /* Header */
    .header {
      margin-bottom: 24px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }

    .header-main { flex: 1; min-width: 0; }

    .header-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    /* Theme switcher */
    .theme-switcher {
      display: inline-flex;
      padding: 3px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      box-shadow: var(--shadow);
      gap: 2px;
    }

    .theme-btn {
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1;
      padding: 7px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      touch-action: manipulation;
      transition: all var(--transition);
    }

    .theme-btn:hover {
      color: var(--text);
      background: var(--bg-card-hover);
    }

    .theme-btn.active {
      color: var(--text);
      background: var(--bg-elevated);
      box-shadow: inset 0 0 0 1px var(--border-hover);
      font-weight: 500;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
      line-height: 1.45;
      word-break: break-word;
    }

    .header .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--accent);
      background: rgba(55,138,221,0.12);
      border: 1px solid rgba(55,138,221,0.25);
      border-radius: 20px;
    }

    .overall-progress {
      text-align: right;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .overall-pct {
      font-size: 28px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s;
    }

    .overall-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .progress-track {
      height: 6px;
      background: var(--bg-elevated);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(90deg, var(--phase-color, var(--accent)), color-mix(in srgb, var(--phase-color, var(--accent)) 70%, white));
    }

    /* Phase tabs */
    .phase-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 6px;
      margin-bottom: 20px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
    }

    .phase-tabs::-webkit-scrollbar { display: none; }

    .phase-tab {
      flex-shrink: 0;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 72px;
      scroll-snap-align: start;
      touch-action: manipulation;
    }

    .phase-tab:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
    }

    .phase-tab.active {
      border-color: var(--tab-color);
      background: color-mix(in srgb, var(--tab-color) 12%, var(--bg-card));
      color: var(--tab-color);
      font-weight: 500;
      box-shadow: 0 0 20px color-mix(in srgb, var(--tab-color) 20%, transparent);
    }

    .phase-tab .mini-track {
      width: 44px;
      height: 3px;
      background: var(--bg-elevated);
      border-radius: 2px;
      overflow: hidden;
    }

    .phase-tab .mini-fill {
      height: 100%;
      background: var(--tab-color);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Phase card */
    .phase-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .phase-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .phase-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 6px;
    }

    .phase-title {
      font-size: 16px;
      font-weight: 600;
    }

    .phase-sub {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .phase-pct {
      font-size: 20px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .phase-progress-track {
      margin-top: 14px;
      height: 4px;
    }

    /* Sections */
    .sections { display: flex; flex-direction: column; gap: 10px; }

    .section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color var(--transition);
    }

    .section.done {
      border-color: color-mix(in srgb, var(--success) 30%, var(--border));
    }

    .section-header {
      width: 100%;
      padding: 14px 18px;
      background: transparent;
      border: none;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      text-align: left;
      font-family: inherit;
      transition: background var(--transition);
      touch-action: manipulation;
    }

    .section-header:hover { background: var(--bg-card-hover); }

    .section-chevron {
      color: var(--text-muted);
      font-size: 14px;
      transition: transform 0.25s ease;
      flex-shrink: 0;
      width: 16px;
    }

    .section.open .section-chevron { transform: rotate(90deg); }

    .section-info { flex: 1; min-width: 0; }

    .section-meta {
      display: block;
    }

    .section-week {
      display: block;
      font-size: 11px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .section-title {
      display: block;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      word-break: break-word;
    }

    .section-count {
      font-size: 11px;
      color: var(--text-secondary);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      text-align: right;
      line-height: 1.35;
      max-width: 42%;
    }

    .section-count.all-done { color: var(--success); }

    .section-body {
      border-top: 1px solid var(--border);
      display: none;
    }

    .section.open .section-body { display: block; }

    /* Resources */
    .resources {
      padding: 12px 18px;
      background: var(--bg-overlay);
      border-bottom: 1px solid var(--border);
    }

    .resources-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .resource-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .resource-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 6px;
      text-decoration: none;
      transition: all var(--transition);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      background: var(--bg-elevated);
    }

    .resource-link:hover {
      border-color: var(--phase-color);
      color: var(--phase-color);
      background: color-mix(in srgb, var(--phase-color) 8%, var(--bg-elevated));
    }

    .resource-link .rtype {
      font-size: 10px;
      opacity: 0.7;
    }

    .resource-link.no-url {
      cursor: default;
      pointer-events: none;
    }

    /* Tasks */
    .task {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 18px;
      cursor: pointer;
      transition: background var(--transition);
      user-select: none;
      touch-action: manipulation;
      min-height: 48px;
    }

    .task:active { background: var(--bg-card-hover); }

    .task:hover { background: var(--bg-card-hover); }

    .task + .task { border-top: 1px solid var(--border); }

    .checkbox {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: 2px solid var(--border-hover);
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .task:hover .checkbox { border-color: var(--phase-color); }

    .task.done .checkbox {
      background: var(--phase-color);
      border-color: var(--phase-color);
      transform: scale(1.05);
    }

    .checkbox svg {
      width: 11px;
      height: 9px;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.2s ease;
    }

    .task.done .checkbox svg {
      opacity: 1;
      transform: scale(1);
    }

    .task-text {
      font-size: 13px;
      line-height: 1.55;
      transition: all var(--transition);
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    .task.done .task-text {
      color: var(--text-muted);
      text-decoration: line-through;
      text-decoration-color: var(--text-muted);
    }

    .task-tag {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      margin-right: 6px;
      vertical-align: middle;
      font-weight: 500;
    }

    .task-tag.practice {
      color: #3ecf8e;
      background: rgba(62,207,142,0.12);
    }

    .task-tag.parallel {
      color: #EF9F27;
      background: rgba(239,159,39,0.12);
    }

    .task-tag.required {
      color: #5b9cf5;
      background: rgba(91,156,245,0.12);
    }

    .task-tag.optional {
      color: var(--text-muted);
      background: var(--optional-tag-bg);
      border: 1px solid var(--border);
    }

    .task.optional-task .task-text { opacity: 0.92; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .legend-item {
      font-size: 11px;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .required-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Footer actions */
    .footer-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      justify-content: center;
    }

    .btn {
      padding: 10px 16px;
      font-size: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      font-family: inherit;
      transition: all var(--transition);
      touch-action: manipulation;
      min-height: 44px;
    }

    .btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: var(--bg-card-hover);
    }

    .btn-danger:hover {
      border-color: rgba(216,90,48,0.4);
      color: #e87a5a;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: calc(28px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-elevated);
      border: 1px solid var(--success);
      color: var(--success);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      box-shadow: var(--shadow);
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      pointer-events: none;
      max-width: calc(100vw - 32px);
      text-align: center;
      line-height: 1.45;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 640px) {
      .app {
        padding: 16px 14px calc(48px + env(safe-area-inset-bottom, 0px));
        padding-top: calc(16px + env(safe-area-inset-top, 0px));
      }

      .header { margin-bottom: 18px; }

      .header-top {
        flex-direction: column;
        gap: 12px;
      }

      .header-actions {
        width: 100%;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .theme-switcher {
        width: 100%;
        display: flex;
        justify-content: space-between;
      }

      .theme-btn {
        flex: 1;
        padding: 8px 6px;
        font-size: 10px;
      }

      .header-main { width: 100%; }

      .header h1 { font-size: 20px; }

      .header .subtitle { font-size: 12px; }

      .header .badge {
        font-size: 10px;
        line-height: 1.4;
        max-width: 100%;
      }

      .overall-progress {
        text-align: left;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
      }

      .overall-pct { font-size: 24px; }

      .overall-label,
      .required-label { font-size: 11px; }

      .legend {
        gap: 6px 10px;
      }

      .legend-item { font-size: 10px; }

      .phase-tabs {
        margin-left: -4px;
        margin-right: -4px;
        padding-left: 4px;
        padding-right: 4px;
      }

      .phase-tab {
        min-width: 62px;
        padding: 8px 12px;
        font-size: 12px;
      }

      .phase-card {
        padding: 14px 16px;
      }

      .phase-card-header {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }

      .phase-card-header > div:last-child {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }

      .phase-title { font-size: 15px; }

      .phase-pct { font-size: 18px; }

      .section-header {
        flex-wrap: wrap;
        padding: 12px 14px;
        gap: 10px;
      }

      .section-chevron { margin-top: 2px; }

      .section-count {
        max-width: 100%;
        width: 100%;
        padding-left: 26px;
        margin-top: 2px;
        text-align: left;
        font-size: 10px;
      }

      .resources,
      .task {
        padding-left: 14px;
        padding-right: 14px;
      }

      .resource-link {
        font-size: 11px;
        padding: 6px 10px;
        max-width: 100%;
        word-break: break-word;
      }

      .task {
        gap: 12px;
        padding-top: 12px;
        padding-bottom: 12px;
      }

      .task-text { font-size: 12px; }

      .task-tag {
        font-size: 9px;
        margin-bottom: 2px;
      }

      .footer-actions {
        flex-wrap: wrap;
        gap: 8px;
      }

      .btn {
        flex: 1 1 calc(50% - 4px);
        font-size: 11px;
        padding: 10px 8px;
      }

      .btn-danger {
        flex: 1 1 100%;
      }
    }

    @media (max-width: 380px) {
      .header h1 { font-size: 18px; }

      .overall-progress {
        flex-direction: column;
        align-items: flex-start;
      }

      .phase-tab { min-width: 56px; }

      .section-count {
        padding-left: 0;
        line-height: 1.5;
      }

      .footer-actions { flex-direction: column; }

      .btn { flex: 1 1 100%; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>
  <div class="toast" id="toast"></div>

  <script>
  const SK = 'java_growth_roadmap_v3';
  const THEME_SK = 'java_growth_roadmap_theme';
  const TOTAL_WEEKS = 40;

  const PHASES = [
    {
      id:'p1', n:1, title:'Java + Spring 核心夯实', sub:'Month 1–2 · 8周', color:'#378ADD',
      note:'先打牢语言与 Spring 原理，设计模式紧跟 Spring 学更易理解',
      sections:[

            { id:'t403', t:'二分：搜索旋转数组、查找首尾位置' },
            { id:'t404', t:'二叉树：前中后序、最大深度、对称二叉树（BFS+DFS）' },
            { id:'t405', t:'目标：本阶段再完成 40 道 Medium，累计总量 120+ 题' },
            { id:'t406', t:'每天 1 题保持手感，直到拿到 offer', parallel:true },
          ]
        },
        { id:'s502', week:'Week 38–40', title:'面试冲刺',
          resources:[
            { label:'JavaGuide 面试题', url:'https://javaguide.cn/interview-preparation/interview-preparation.html', type:'网站' },
            { label:'小林 coding', url:'https://xiaolincoding.com/', type:'图解' },
            { label:'《Java 面试指北》', url:'https://javaguide.cn/zhuanlan/java-mian-shi-zhi-bei.html', type:'专栏' },
          ],
          tasks:[
            { id:'t411', t:'Java 高频 50 题：用自己的话写出理解（不死记硬背）' },
            { id:'t412', t:'MySQL/Redis/Spring/分布式各 20 条高频题 + 答案' },
            { id:'t413', t:'简历优化：项目放首位，量化工作经历（QPS/优化幅度）' },
            { id:'t414', t:'模拟面试 3 次：自我介绍+技术题+项目讲解+反问', practice:true },
            { id:'t415', t:'投递 20-30 家，优先 B 轮以上有技术氛围的互联网公司' },
          ]
        },
      ]
    },
  ];

  // ── State ──
  let done = {};
  let activePhase = 0;
  let open = {};
  let themeMode = localStorage.getItem(THEME_SK) || 'dark';

  function getSystemTheme() {
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  function getResolvedTheme() {
    return themeMode === 'system' ? getSystemTheme() : themeMode;
  }

  function updateThemeMeta() {
    const meta = document.getElementById('metaThemeColor');
    if (!meta) return;
    const color = getComputedStyle(document.documentElement).getPropertyValue('--theme-meta').trim();
    meta.setAttribute('content', color || (getResolvedTheme() === 'dark' ? '#0a0e14' : '#f4f6f9'));
  }

  function themeSwitcherHtml() {
    return `<div class="theme-switcher" role="group" aria-label="主题切换">
      <button type="button" class="theme-btn${themeMode === 'dark' ? ' active' : ''}" data-theme="dark" onclick="setTheme('dark')">深色</button>
      <button type="button" class="theme-btn${themeMode === 'light' ? ' active' : ''}" data-theme="light" onclick="setTheme('light')">浅色</button>
      <button type="button" class="theme-btn${themeMode === 'system' ? ' active' : ''}" data-theme="system" onclick="setTheme('system')">系统</button>
    </div>`;
  }

  function setTheme(mode) {
    if (!['dark', 'light', 'system'].includes(mode)) return;
    themeMode = mode;
    document.documentElement.setAttribute('data-theme', mode);
    localStorage.setItem(THEME_SK, mode);
    updateThemeMeta();
    render();
  }

  function initThemeListener() {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (themeMode === 'system') updateThemeMeta();
    });
  }

  function load() {
    try {
      const raw = localStorage.getItem(SK);
      if (raw) {
        const d = JSON.parse(raw);
        if (d.done) done = d.done;
        if (typeof d.p === 'number') activePhase = d.p;
        if (d.open) open = d.open;
      }
    } catch {}
    if (!Object.keys(open).length && PHASES[activePhase]) {
      open[PHASES[activePhase].sections[0].id] = true;
    }
  }

  function saveState() {
    localStorage.setItem(SK, JSON.stringify({ done, p: activePhase, open }));
  }

  function allTasks() {
    return PHASES.flatMap(p => p.sections.flatMap(s => s.tasks));
  }

  function requiredTasks(tasks) {
    return tasks.filter(t => !t.optional);
  }

  function prog(tasks) {
    const n = tasks.filter(t => done[t.id]).length;
    return { n, total: tasks.length, pct: tasks.length ? Math.round(n / tasks.length * 100) : 0 };
  }

  function formatSectionCount(sec) {
    const all = sec.tasks;
    const req = requiredTasks(all);
    const sp = prog(req);
    const spAll = prog(all);
    if (req.length < all.length) {
      return `${sp.n}/${sp.total} 必做 · 共 ${spAll.n}/${spAll.total}`;
    }
    return `${sp.n}/${sp.total} 必做`;
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => el.classList.remove('show'), 2200);
  }

  function toggleSection(sid) {
    open[sid] = !open[sid];
    saveState();
    render();
  }

  function goPhase(i) {
    activePhase = i;
    const first = PHASES[i].sections[0].id;
    open = { [first]: true };
    saveState();
    render();
  }

  function resetProgress() {
    if (!confirm('确定要清空所有进度吗？此操作不可撤销。')) return;
    done = {};
    open = { [PHASES[activePhase].sections[0].id]: true };
    localStorage.removeItem(SK);
    saveState();
    render();
    showToast('进度已重置');
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function render() {
    const app = document.getElementById('app');
    const tasks = allTasks();
    const req = requiredTasks(tasks);
    const total = prog(tasks);
    const reqTotal = prog(req);
    const ph = PHASES[activePhase];
    const phTasks = ph.sections.flatMap(s => s.tasks);
    const phReq = requiredTasks(phTasks);
    const phProg = prog(phReq);
    const phAllProg = prog(phTasks);

    let html = '';

    // Header
    html += `<div class="header">
      <div class="header-top">
        <div class="header-main">
          <h1>Java 成长路线图</h1>
          <p class="subtitle">9–10 个月 · ${TOTAL_WEEKS} 周 · 5 阶段 · 必做 ${reqTotal.total} 项 / 共 ${tasks.length} 项 · 1年+经验定制版</p>
          <span class="badge">技术栈：JDK 17 + Spring Boot 3 + Spring Cloud Alibaba</span>
        </div>
        <div class="header-actions">
          ${themeSwitcherHtml()}
          <div class="overall-progress">
            <div>
              <div class="overall-label">必做 ${reqTotal.n} / ${reqTotal.total}</div>
              <div class="required-label">全部 ${total.n} / ${total.total}</div>
            </div>
            <div class="overall-pct" style="color:${reqTotal.pct===100?'var(--success)':'var(--accent)'}">${reqTotal.pct}%</div>
          </div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${reqTotal.pct}%"></div>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="task-tag required">必做</span> 面试/项目核心</span>
        <span class="legend-item"><span class="task-tag optional">选做</span> 时间紧可跳过</span>
        <span class="legend-item"><span class="task-tag practice">实践</span> 需写代码</span>
        <span class="legend-item"><span class="task-tag parallel">并行</span> 全程持续</span>
      </div>
    </div>`;

    // Phase tabs
    html += '<div class="phase-tabs">';
    PHASES.forEach((p, i) => {
      const pp = prog(requiredTasks(p.sections.flatMap(s => s.tasks)));
      const active = i === activePhase;
      html += `<button class="phase-tab${active?' active':''}" style="--tab-color:${p.color}" onclick="goPhase(${i})">
        <span>P${p.n}</span>
        <div class="mini-track"><div class="mini-fill" style="width:${pp.pct}%;background:${p.color}"></div></div>
      </button>`;
    });
    html += '</div>';

    // Phase card
    html += `<div class="phase-card" style="--phase-color:${ph.color}">
      <div class="phase-card-header">
        <div>
          <span class="phase-tag" style="background:${ph.color}18;color:${ph.color};border:1px solid ${ph.color}44">Phase ${ph.n}</span>
          <div class="phase-sub">${esc(ph.sub)}</div>
          <div class="phase-title">${esc(ph.title)}</div>
          ${ph.note ? `<div class="phase-sub" style="margin-top:6px;font-style:italic">${esc(ph.note)}</div>` : ''}
        </div>
        <div style="text-align:right">
          <div class="phase-pct" style="color:${ph.color}">${phProg.pct}%</div>
          <div class="phase-sub">必做 ${phProg.n} / ${phProg.total}</div>
          <div class="required-label">全部 ${phAllProg.n}/${phAllProg.total}</div>
        </div>
      </div>
      <div class="progress-track phase-progress-track">
        <div class="progress-fill" style="width:${phProg.pct}%;--phase-color:${ph.color}"></div>
      </div>
    </div>`;

    // Sections
    html += '<div class="sections" style="--phase-color:' + ph.color + '">';
    ph.sections.forEach(sec => {
      const sp = prog(requiredTasks(sec.tasks));
      const isOpen = !!open[sec.id];
      const allDone = sp.pct === 100;

      html += `<div class="section${isOpen?' open':''}${allDone?' done':''}" id="sec-${sec.id}">
        <button class="section-header" onclick="toggleSection('${sec.id}')">
          <span class="section-chevron">›</span>
          <div class="section-info">
            <div class="section-meta">
              <span class="section-week" style="color:${ph.color}">${esc(sec.week)}</span>
              <span class="section-title">${esc(sec.title)}</span>
            </div>
          </div>
          <span class="section-count${allDone?' all-done':''}">${formatSectionCount(sec)}${allDone?' ✓':''}</span>
        </button>
        <div class="section-body">`;

      if (sec.resources && sec.resources.length) {
        html += '<div class="resources"><div class="resources-label">推荐学习资源</div><div class="resource-list">';
        sec.resources.forEach(r => {
          if (r.url) {
            html += `<a class="resource-link" href="${esc(r.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
              <span class="rtype">${esc(r.type)}</span>${esc(r.label)}</a>`;
          } else {
            html += `<span class="resource-link no-url"><span class="rtype">${esc(r.type)}</span>${esc(r.label)}</span>`;
          }
        });
        html += '</div></div>';
      }

      sec.tasks.forEach(task => {
        const isDone = !!done[task.id];
        let prefix = task.optional
          ? '<span class="task-tag optional">选做</span>'
          : '<span class="task-tag required">必做</span>';
        if (task.practice) prefix += '<span class="task-tag practice">实践</span>';
        if (task.parallel) prefix += '<span class="task-tag parallel">并行</span>';

        html += `<div class="task${isDone?' done':''}${task.optional?' optional-task':''}" onclick="toggleTask('${task.id}','${sec.id}')">
          <div class="checkbox">
            <svg viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span class="task-text">${prefix}${esc(task.t)}</span>
        </div>`;
      });

      html += '</div></div>';
    });
    html += '</div>';

    // Footer
    html += `<div class="footer-actions">
      <button class="btn" onclick="expandAll()">展开全部</button>
      <button class="btn" onclick="collapseAll()">收起全部</button>
      <button class="btn btn-danger" onclick="resetProgress()">重置进度</button>
    </div>`;

    app.innerHTML = html;
  }

  function toggleTask(id, sectionId) {
    const phTasks = PHASES[activePhase].sections.flatMap(s => s.tasks);
    const wasDone = !!done[id];
    done[id] = !wasDone;
    saveState();
    render();

    if (!wasDone) {
      const sec = PHASES[activePhase].sections.find(s => s.id === sectionId);
      if (sec && prog(requiredTasks(sec.tasks)).pct === 100) showToast('章节「' + sec.title + '」必做项已全部完成！');
      if (prog(requiredTasks(phTasks)).pct === 100) showToast('阶段「' + PHASES[activePhase].title + '」必做项已全部完成！');
      if (prog(requiredTasks(allTasks())).pct === 100) showToast('恭喜！全部必做任务完成，可以投递简历了！');
    }
  }

  function expandAll() {
    PHASES[activePhase].sections.forEach(s => { open[s.id] = true; });
    saveState();
    render();
  }

  function collapseAll() {
    open = {};
    saveState();
    render();
  }

  window.goPhase = goPhase;
  window.toggleSection = toggleSection;
  window.toggleTask = toggleTask;
  window.resetProgress = resetProgress;
  window.expandAll = expandAll;
  window.collapseAll = collapseAll;
  window.setTheme = setTheme;

  load();
  initThemeListener();
  updateThemeMeta();
  render();
  </script>
</body>
</html>
