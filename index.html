<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0e14" id="metaThemeColor" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Java 成长路线图 · 9-10 个月进阶计划</title>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app" id="app"></div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <div class="ios-overlay" id="iosOverlay" hidden>
      <div
        class="ios-alert"
        role="alertdialog"
        aria-modal="true"
        aria-labelledby="iosAlertTitle"
        aria-describedby="iosAlertMessage"
      >
        <div class="ios-alert-title" id="iosAlertTitle"></div>
        <div class="ios-alert-message" id="iosAlertMessage"></div>
        <div class="ios-alert-actions" id="iosAlertActions"></div>
      </div>
    </div>
    <div class="section-complete-overlay" id="sectionCompleteOverlay" hidden>
      <canvas class="section-complete-confetti" id="sectionCompleteConfetti" aria-hidden="true"></canvas>
      <div class="section-complete-content" role="dialog" aria-modal="true" aria-labelledby="sectionCompleteTitle" aria-describedby="sectionCompleteMessage">
        <div class="section-complete-icon" aria-hidden="true">✓</div>
        <h2 class="section-complete-title" id="sectionCompleteTitle">小节通关</h2>
        <p class="section-complete-week" id="sectionCompleteWeek"></p>
        <p class="section-complete-subtitle" id="sectionCompleteSubtitle"></p>
        <p class="section-complete-message" id="sectionCompleteMessage"></p>
        <button type="button" class="section-complete-btn" id="sectionCompleteClose">继续学习</button>
      </div>
    </div>
    <div class="victory-overlay" id="victoryOverlay" hidden>
      <canvas class="victory-confetti" id="victoryConfetti" aria-hidden="true"></canvas>
      <div class="victory-content" role="dialog" aria-modal="true" aria-labelledby="victoryTitle">
        <div class="victory-icon" aria-hidden="true">🏆</div>
        <h2 class="victory-title" id="victoryTitle">通关！</h2>
        <p class="victory-subtitle">全部必做任务已完成</p>
        <p class="victory-message" id="victoryMessage"></p>
        <div class="victory-stats" id="victoryStats"></div>
        <button type="button" class="victory-btn" id="victoryClose">继续浏览</button>
      </div>
    </div>
    <div class="ios-overlay ios-overlay-sheet" id="iosSheetOverlay" hidden>
      <div
        class="ios-action-sheet"
        role="dialog"
        aria-modal="true"
        aria-labelledby="iosSheetTitle"
      >
        <div class="ios-sheet-title" id="iosSheetTitle">更多操作</div>
        <div class="ios-sheet-actions" id="iosSheetActions"></div>
        <button type="button" class="ios-sheet-cancel" id="iosSheetCancel">
          取消
        </button>
      </div>
    </div>
    <script src="js/data.js"></script>
    <script src="js/celebration.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
